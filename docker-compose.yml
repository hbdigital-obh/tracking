# ============================================================
# docker-compose.yml — Orchestration des services
# ============================================================

version: '3.8'

services:

  # Service API FastAPI
  api:
    build: .
    container_name: hb-tracking-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://hbuser:hbpassword@db:5432/hbtracking
      - SECRET_KEY=hbdigital-secret-key-2026
    depends_on:
      - db
    restart: always

  # Service PostgreSQL
  db:
    image: postgres:16
    container_name: hb-tracking-db
    environment:
      - POSTGRES_USER=hbuser
      - POSTGRES_PASSWORD=hbpassword
      - POSTGRES_DB=hbtracking
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: